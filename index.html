<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>글쓰기 · 스토리텔링 레퍼런스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4EFE6; --paper2:#EDE6D8; --ink:#23201B; --ink2:#5A5346;
  --line:#D9CFBC; --clay:#9C5A3C; --clay2:#B97A57; --gold:#8A7A4E;
  --shadow:0 1px 2px rgba(40,32,20,.05),0 8px 24px rgba(40,32,20,.06);
  --serif:"Noto Serif KR",serif; --batang:"Gowun Batang",serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--serif);line-height:1.7;
  -webkit-font-smoothing:antialiased;font-size:16px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* layout */
.wrap{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid var(--line);
  background:var(--paper2);padding:22px 18px}
.main{min-width:0;padding:34px 40px 120px}
@media(max-width:860px){
  .wrap{grid-template-columns:1fr}
  .side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line)}
  .main{padding:24px 18px 100px}
}

/* sidebar */
.brand{font-weight:700;font-size:1.18rem;letter-spacing:-.01em;line-height:1.35}
.brand small{display:block;font-weight:400;color:var(--ink2);font-size:.74rem;margin-top:6px;letter-spacing:.02em}
.search{margin:18px 0 14px;position:relative}
.search input{width:100%;padding:11px 12px 11px 34px;border:1px solid var(--line);border-radius:10px;
  background:var(--paper);font-family:var(--serif);font-size:.92rem;color:var(--ink)}
.search input:focus{outline:2px solid var(--clay2);outline-offset:1px;border-color:transparent}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.5}
.modes{display:flex;gap:6px;margin-bottom:14px}
.modes button{flex:1;padding:7px 0;border:1px solid var(--line);background:var(--paper);border-radius:8px;
  font-size:.82rem;color:var(--ink2)}
.modes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.nav{font-size:.9rem}
.nav .grp{margin-bottom:4px}
.nav .grp>.lbl{font-size:.7rem;letter-spacing:.08em;color:var(--gold);text-transform:uppercase;
  margin:14px 2px 6px;font-weight:600}
.nav a.item{display:flex;gap:8px;align-items:baseline;padding:5px 8px;border-radius:7px;color:var(--ink2)}
.nav a.item:hover{background:var(--paper);color:var(--ink)}
.nav a.item.active{background:var(--ink);color:var(--paper)}
.nav a.item .n{font-size:.7rem;opacity:.6;min-width:18px}
.nav a.bk{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;color:var(--ink2)}
.nav a.bk:hover{background:var(--paper);color:var(--ink)}
.dot{width:9px;height:9px;border-radius:50%;flex:none}

/* main */
.crumb{font-size:.76rem;letter-spacing:.06em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;font-weight:600}
h1.t{font-size:2rem;line-height:1.25;margin:0 0 6px;letter-spacing:-.015em}
.bookchips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 26px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;font-size:.78rem;
  border:1px solid var(--line);background:var(--paper2);color:var(--ink2)}
.chip:hover{color:var(--ink)}
.chip .dot{width:8px;height:8px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;
  box-shadow:var(--shadow);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cc,var(--clay))}
.card h3{margin:0 0 9px;font-size:1.02rem;line-height:1.4;letter-spacing:-.01em;padding-left:4px}
.card p{margin:0;font-family:var(--batang);font-size:.92rem;line-height:1.72;color:#33302a;padding-left:4px}
mark{background:#F2D9A0;color:inherit;padding:0 1px;border-radius:2px}

.quote{margin:30px 0 6px;padding:20px 22px;border-left:3px solid var(--clay);background:var(--paper2);
  border-radius:0 12px 12px 0;font-family:var(--batang);font-size:1.02rem;line-height:1.8}
.quote .who{display:block;margin-top:10px;font-family:var(--serif);font-size:.82rem;color:var(--gold)}

.related{margin-top:36px;border-top:1px solid var(--line);padding-top:20px}
.related .lbl{font-size:.72rem;letter-spacing:.07em;color:var(--gold);text-transform:uppercase;font-weight:600;margin-bottom:12px}
.relgrid{display:flex;flex-wrap:wrap;gap:10px}
.relcard{display:flex;gap:10px;align-items:baseline;padding:10px 14px;border:1px solid var(--line);
  border-radius:10px;background:var(--paper2);font-size:.88rem;min-width:200px}
.relcard:hover{background:var(--ink);color:var(--paper)}
.relcard .n{font-size:.72rem;color:var(--gold)}
.relcard:hover .n{color:var(--clay2)}

/* home */
.lead{font-family:var(--batang);font-size:1.05rem;color:var(--ink2);max-width:60ch;margin:0 0 28px}
.parts{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.pcard{border:1px solid var(--line);border-radius:14px;background:var(--paper2);padding:18px;box-shadow:var(--shadow)}
.pcard .pn{font-size:.72rem;color:var(--gold);letter-spacing:.06em;font-weight:600}
.pcard h3{margin:6px 0 12px;font-size:1.08rem}
.pcard a.s{display:flex;gap:8px;padding:4px 0;font-size:.86rem;color:var(--ink2);border-top:1px dotted var(--line)}
.pcard a.s:first-of-type{border-top:none}
.pcard a.s:hover{color:var(--clay)}
.pcard a.s .n{font-size:.72rem;color:var(--gold);min-width:18px}
.statbar{display:flex;gap:22px;margin:0 0 26px;flex-wrap:wrap}
.statbar div{font-size:.84rem;color:var(--ink2)}
.statbar b{font-size:1.5rem;font-weight:700;color:var(--clay);display:block;font-feature-settings:"tnum"}

.empty{color:var(--ink2);font-family:var(--batang);padding:40px 0}
.backtop{margin-top:30px;font-size:.82rem;color:var(--gold)}
.skip{position:absolute;left:-999px}
.skip:focus{left:8px;top:8px;background:var(--ink);color:var(--paper);padding:8px 12px;border-radius:8px;z-index:9}
/* full index home */
.ipart{border-bottom:1px solid var(--line)}
.ipart>summary{cursor:pointer;list-style:none;padding:14px 4px;font-size:.74rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:9px}
.ipart>summary::-webkit-details-marker{display:none}
.ipart>summary::before{content:"\25B8";color:var(--clay);font-size:.8rem;transition:transform .15s}
.ipart[open]>summary::before{transform:rotate(90deg)}
.ipart>summary:focus-visible{outline:2px solid var(--clay2);outline-offset:2px;border-radius:6px}
.isec{padding:2px 0 16px 4px}
.ihead{display:flex;align-items:center;gap:8px;font-size:1.02rem;font-weight:600;padding:6px 6px;border-radius:7px}
.ihead:hover{background:var(--paper);color:var(--clay)}
.ihead .n{font-size:.72rem;color:var(--gold);min-width:20px}
.idots{display:inline-flex;gap:3px;margin-left:4px}
.idots i{width:7px;height:7px;border-radius:50%;display:inline-block}
.icards{list-style:none;margin:5px 0 0;padding:0 0 0 30px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px 16px}
.icards a{display:block;font-family:var(--batang);font-size:.87rem;color:var(--ink2);padding:3px 8px;border-radius:6px;
  border-left:1px solid var(--line)}
.icards a:hover{color:var(--ink);background:var(--paper);border-left-color:var(--clay)}
.card.target{box-shadow:0 0 0 2px var(--clay),var(--shadow)}
@media(prefers-reduced-motion:no-preference){
  .card.target{animation:flash 1.5s ease-out}
  @keyframes flash{0%{box-shadow:0 0 0 4px var(--clay2),var(--shadow)}100%{box-shadow:0 0 0 2px var(--clay),var(--shadow)}}
}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
</style>
</head>
<body>
<a class="skip" href="#main">본문으로 건너뛰기</a>
<div class="wrap">
  <aside class="side">
    <div class="brand">글쓰기 · 스토리텔링<br>레퍼런스
      <small>작법서 28주제 · 20여 권 교차 색인</small>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="개념·문장 검색 (예: 능동태, 갈등, 클리프행어)" autocomplete="off">
    </div>
    <div class="modes">
      <button id="mTopic" class="on">주제별</button>
      <button id="mBook">책별</button>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>
<script>
let DATA, BK, SEC, byId, bkeys=[];

// stable hue per book key (bkeys assigned after data loads)
function hue(k){const i=bkeys.indexOf(k);return (i*47+12)%360;}
function bg(k){return `hsl(${hue(k)},34%,55%)`;}
function softbg(k){return `hsl(${hue(k)},38%,90%)`;}

// which sections cite a book
function secsForBook(k){return SEC.filter(s=>s.books.includes(k));}

const nav=document.getElementById('main')?document.getElementById('nav'):null;
const main=document.getElementById('main');
const navEl=document.getElementById('nav');
let mode='topic';
let current=null;

function esc(t){return t.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function hl(t,q){t=esc(t);if(!q)return t;const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return t.replace(re,'<mark>$1</mark>');}

function renderNav(){
  if(mode==='topic'){
    let h='';
    DATA.parts.forEach(p=>{
      const ss=SEC.filter(s=>s.part===p);
      h+=`<div class="grp"><div class="lbl">${esc(p)}</div>`;
      ss.forEach(s=>{h+=`<a class="item ${current===s.id?'active':''}" href="#s/${s.id}"><span class="n">${s.id}</span><span>${esc(s.title)}</span></a>`;});
      h+='</div>';
    });
    navEl.innerHTML=h;
  }else{
    let h='<div class="grp">';
    bkeys.forEach(k=>{
      const n=secsForBook(k).length; if(!n)return;
      h+=`<a class="bk" href="#b/${k}"><span class="dot" style="background:${bg(k)}"></span><span>${esc(BK[k])}</span></a>`;
    });
    h+='</div>';
    navEl.innerHTML=h;
  }
}

function bookChips(keys,q){
  return `<div class="bookchips">`+keys.map(k=>`<a class="chip" href="#b/${k}"><span class="dot" style="background:${bg(k)}"></span>${hl(BK[k],q)}</a>`).join('')+`</div>`;
}
function cardHtml(s,c,q,ci){
  const cc=bg(s.books[0]);
  const idAttr = (ci!==undefined&&ci!==null)?` id="c${ci}"`:'';
  return `<div class="card"${idAttr} style="--cc:${cc}"><h3>${hl(c.h,q)}</h3><p>${hl(c.b,q)}</p></div>`;
}

function viewHome(){
  current=null; if(mode==='book'){mode='topic';setModeBtns();} renderNav();
  const nCards=SEC.reduce((a,s)=>a+s.cards.length,0);
  let h=`<div class="crumb">Writer's Reference · 전체 색인</div>
  <h1 class="t">작법 개념 색인</h1>
  <p class="lead">작법서 스무 권 남짓에서 뽑은 ${nCards}개 원리를 한눈에 펼친 색인입니다. 주제 제목을 누르면 그 주제로, 아래 항목을 누르면 해당 원리 카드로 곧장 들어가 강조됩니다.</p>
  <div class="statbar"><div><b>${SEC.length}</b>주제</div><div><b>${nCards}</b>원리 카드</div><div><b>${bkeys.length}</b>권 출처</div><div><b>${DATA.parts.length}</b>분류</div></div>`;
  DATA.parts.forEach((p,i)=>{
    const ss=SEC.filter(s=>s.part===p);
    h+=`<details class="ipart" open><summary>PART ${i+1} · ${esc(p)}</summary>`;
    ss.forEach(s=>{
      const dots=s.books.map(k=>`<i style="background:${bg(k)}" title="${esc(BK[k])}"></i>`).join('');
      h+=`<div class="isec"><a class="ihead" href="#s/${s.id}"><span class="n">${s.id}</span><span>${esc(s.title)}</span><span class="idots">${dots}</span></a>`;
      h+=`<ul class="icards">`+s.cards.map((c,ci)=>`<li><a href="#s/${s.id}/${ci}">${esc(c.h)}</a></li>`).join('')+`</ul></div>`;
    });
    h+=`</details>`;
  });
  main.innerHTML=h; window.scrollTo(0,0);
}

function viewSection(id,cardIdx){
  const s=byId[id]; if(!s){viewHome();return;}
  current=id; renderNav();
  let h=`<div class="crumb">${esc(s.part)} · ${s.id}</div><h1 class="t">${esc(s.title)}</h1>`;
  h+=bookChips(s.books,'');
  h+=`<div class="cards">`+s.cards.map((c,ci)=>cardHtml(s,c,'',ci)).join('')+`</div>`;
  if(s.quote){h+=`<div class="quote">“${esc(s.quote[0])}”<span class="who">— ${esc(s.quote[1])}</span></div>`;}
  if(s.related&&s.related.length){
    h+=`<div class="related"><div class="lbl">관련 주제 · 다른 책에서 같은 결</div><div class="relgrid">`;
    s.related.forEach(r=>{const t=byId[r];if(t)h+=`<a class="relcard" href="#s/${t.id}"><span class="n">${t.id}</span><span>${esc(t.title)}</span></a>`;});
    h+=`</div></div>`;
  }
  h+=`<div class="backtop"><a href="#">← 전체 색인으로</a></div>`;
  main.innerHTML=h;
  if(cardIdx!=null && !isNaN(cardIdx)){
    const el=document.getElementById('c'+cardIdx);
    if(el){const rm=matchMedia('(prefers-reduced-motion:reduce)').matches;
      requestAnimationFrame(()=>{el.scrollIntoView({block:'center',behavior:rm?'auto':'smooth'});el.classList.add('target');setTimeout(()=>el.classList.remove('target'),1600);});
      return;}
  }
  window.scrollTo(0,0);
}

function viewBook(k){
  if(!BK[k]){viewHome();return;}
  current=null; mode='book'; setModeBtns(); renderNav();
  const ss=secsForBook(k);
  let h=`<div class="crumb">출처별 보기</div><h1 class="t"><span class="dot" style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${bg(k)};vertical-align:middle;margin-right:8px"></span>${esc(BK[k])}</h1>`;
  h+=`<p class="lead">이 책의 원리가 등장하는 주제 ${ss.length}곳입니다. 한 책이 여러 주제에 걸쳐 있는 만큼, 같은 주제를 다룬 다른 책으로도 옆으로 건너갈 수 있습니다.</p>`;
  h+=`<div class="relgrid">`;
  ss.forEach(s=>{h+=`<a class="relcard" href="#s/${s.id}"><span class="n">${s.id}</span><span>${esc(s.title)} <small style="color:var(--gold)">· ${esc(s.part)}</small></span></a>`;});
  h+=`</div><div class="backtop"><a href="#">← 전체 색인으로</a></div>`;
  main.innerHTML=h; window.scrollTo(0,0);
}

function viewSearch(q){
  current=null;
  const ql=q.toLowerCase();
  const hits=[];
  SEC.forEach(s=>{
    s.cards.forEach(c=>{
      if((c.h+' '+c.b).toLowerCase().includes(ql)||s.title.toLowerCase().includes(ql)||s.books.some(b=>BK[b].toLowerCase().includes(ql)))
        hits.push({s,c});
    });
  });
  let h=`<div class="crumb">검색</div><h1 class="t">“${esc(q)}” — ${hits.length}건</h1>`;
  if(!hits.length){h+=`<p class="empty">일치하는 카드가 없습니다. 다른 단어로 찾아보세요. 예: 능동태, 시점, 갈등, 클리프행어, 퇴고.</p>`;}
  else{
    h+=`<div class="cards">`+hits.map(({s,c})=>{
      const cc=bg(s.books[0]);
      return `<a class="card" style="--cc:${cc};display:block" href="#s/${s.id}"><h3>${hl(c.h,q)}</h3><p>${hl(c.b,q)}</p><div style="margin-top:10px;padding-left:4px;font-size:.74rem;color:var(--gold)">${s.id} · ${esc(s.title)}</div></a>`;
    }).join('')+`</div>`;
  }
  main.innerHTML=h; window.scrollTo(0,0);
}

function setModeBtns(){
  document.getElementById('mTopic').classList.toggle('on',mode==='topic');
  document.getElementById('mBook').classList.toggle('on',mode==='book');
}

function route(){
  const hsh=location.hash.slice(1);
  if(hsh.startsWith('s/')){
    if(mode==='book'){mode='topic';setModeBtns();}
    const seg=hsh.slice(2).split('/');
    viewSection(seg[0], seg[1]!==undefined?parseInt(seg[1],10):null);
  }
  else if(hsh.startsWith('b/')){viewBook(hsh.slice(2));}
  else{if(mode==='book'){mode='topic';setModeBtns();}viewHome();}
}

const qEl=document.getElementById('q');
function init(){
  byId=Object.fromEntries(SEC.map(s=>[s.id,s]));
  bkeys=Object.keys(BK);
  document.getElementById('mTopic').onclick=()=>{mode='topic';setModeBtns();renderNav();if(!location.hash.startsWith('#s'))viewHome();};
  document.getElementById('mBook').onclick=()=>{mode='book';setModeBtns();renderNav();};
  let t=null;
  qEl.addEventListener('input',()=>{clearTimeout(t);const v=qEl.value.trim();t=setTimeout(()=>{if(v.length>=1){viewSearch(v);}else{route();}},120);});
  window.addEventListener('hashchange',()=>{qEl.value='';route();});
  renderNav(); route();
}
fetch('data.json',{cache:'no-store'})
  .then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(d=>{DATA=d;BK=d.books;SEC=d.sections;init();})
  .catch(()=>{main.innerHTML='<div class="empty">데이터(data.json)를 불러오지 못했습니다. index.html과 같은 폴더에 data.json이 있는지 확인하세요. 로컬에서 파일을 더블클릭해 열면 브라우저 보안 때문에 안 보일 수 있고, GitHub Pages에서는 정상 작동합니다.</div>';});
</script>
</body>
</html>
