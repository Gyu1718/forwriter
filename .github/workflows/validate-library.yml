name: Validate ForWriter Library

on:
  pull_request:
  push:
    branches:
      - main
      - setup-citation-library

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate library data
        run: python scripts/validate_library.py
